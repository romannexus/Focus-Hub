<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus Hub | Personal Dashboard</title>

    <link rel="stylesheet" href="./styles/styles.css" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- prettier-ignore -->
    <link href="https://fonts.googleapis.com/css2?family=Alumni+Sans+Pinstripe:ital@0;1&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto+Flex:opsz,wght@8..144,100..1000&display=swap" rel="stylesheet"/>
    <!-- <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> -->

    <link rel="icon" href="./img/favicon.png" />

    <script type="module" src="./script/app.js" defer></script>
  </head>
  <body
    class="m-0 bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col antialiased selection:bg-blue-200"
  >
    <!-- Header -->
    <header
      class="flex items-center justify-between px-6 py-4 bg-white shadow-[0_2px_10px_rgba(0,0,0,0.03)] border-b border-gray-100 sticky top-0 z-10"
    >
      <!-- Logo -->
      <div class="flex items-center">
        <img
          src="/img/focus-hub-high-resolution-logo-grayscale-transparent.png"
          width="100"
        />
      </div>

      <div
        id="quote-text"
        class="hidden md:block text-gray-500 italic text-[14px] px-4"
      ></div>

      <!-- Exit button -->
      <div class="text-[14px]">
        <a
          class="text-blue-600 hover:text-blue-800 font-bold underline cursor-pointer transition-colors"
          href="#"
          id="btn-sign-out"
          >Sign out</a
        >
      </div>
    </header>

    <!-- //////////////////////////////////////////////////////////////////////////////////////////// -->
    <!-- Main Content -->
    <main
      class="flex-1 w-full max-w-7xl mx-auto py-10 px-5 grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8"
    >
      <!-- Left Column (Focus & Atmosphere) -->
      <div class="lg:col-span-7 flex flex-col gap-6 md:gap-8">
        <!-- //////////////////////////////////////////////////////////////////////////////////////////// -->
        <!-- 1. Pomodoro Timer -->
        <section
          id="timer--section"
          class="flex flex-col items-center justify-center py-12 px-5 bg-white rounded-[20px] shadow-[0_0_15px_rgba(0,0,0,0.04)] border border-gray-100 relative transition-colors duration-500 ease-in-out"
        >
          <h1
            id="timer--name"
            class="text-xl mt-0 mb-6 font-bold font-condensed text-gray-600 uppercase tracking-wider"
          >
            Focus Session
          </h1>

          <button
            id="timer--btn-settings"
            class="absolute top-5 right-5 text-gray-400 bg-transparent border-none p-2 rounded-lg hover:bg-gray-50 hover:text-gray-600 cursor-pointer transition-colors duration-200"
            aria-label="Timer Settings"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
              ></path>
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
              ></path>
            </svg>
          </button>

          <!-- Time -->
          <div
            id="timer--time-value"
            class="text-8xl md:text-9xl font-bold font-condensed text-gray-900 mb-10 tracking-tight select-none"
          >
            25:00
          </div>

          <!-- Timer Controls -->
          <div class="flex items-center gap-3">
            <button
              id="timer--btn-start"
              class="timer-btn-active border-none font-bold cursor-pointer px-10 py-3.5 rounded-[10px] text-[16px] transition-colors"
            >
              Start
            </button>
            <button
              id="timer--btn-pause"
              class="timer-btn-inactive border-none font-bold cursor-pointer px-8 py-3.5 rounded-[10px] text-[16px] transition-colors"
            >
              Pause
            </button>
            <!-- Reset Button -->
            <button
              id="timer--btn-reset"
              class="text-gray-500 bg-white border border-gray-300 font-bold hover:bg-gray-50 hover:text-gray-800 cursor-pointer p-3.5 rounded-[10px] transition-colors flex items-center justify-center"
              title="Reset"
            >
              <svg
                class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"
                ></path>
              </svg>
            </button>
          </div>
        </section>
        <!-- //////////////////////////////////////////////////////////////////////////////////////////// -->
        <!-- 2. Lofi / Ambient Sounds -->
        <section
          class="py-8 px-6 md:px-8 bg-white rounded-[20px] shadow-[0_0_15px_rgba(0,0,0,0.04)] border border-gray-100"
        >
          <div class="flex items-center justify-between mb-6">
            <h2
              class="text-lg font-bold font-condensed text-gray-600 uppercase tracking-wider"
            >
              Atmosphere
            </h2>

            <!-- Mini Player -->
            <div class="flex items-center gap-4">
              <button
                id="player--btn-play"
                class="play-toggle-btn relative flex items-center justify-center w-10 h-10 bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white rounded-[10px] transition-colors cursor-pointer border border-blue-100 overflow-hidden"
              >
                <svg
                  id="icon-play"
                  class="icon-play absolute w-5 h-5"
                  fill="currentColor"
                  viewBox="0 0 20 20"
                >
                  <path
                    fill-rule="evenodd"
                    d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"
                    clip-rule="evenodd"
                  ></path>
                </svg>

                <svg
                  id="icon-pause"
                  class="icon-pause absolute w-5 h-5"
                  fill="currentColor"
                  viewBox="0 0 20 20"
                >
                  <path
                    fill-rule="evenodd"
                    d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z"
                    clip-rule="evenodd"
                  ></path>
                </svg>
              </button>
              <input
                id="player--btn-volume"
                type="range"
                min="0"
                max="100"
                value="50"
                class="w-24 h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600 outline-none"
              />
            </div>
          </div>

          <!-- Sound Buttons -->
          <div id="player--btns" class="grid grid-cols-3 gap-4">
            <button
              data-sound="rain"
              class="js-sound-btn sound-btn-inactive flex flex-col items-center justify-center p-4 rounded-[10px] transition-all cursor-pointer group"
            >
              <span
                class="text-2xl mb-2 group-hover:scale-110 transition-transform duration-300"
                >🌧️</span
              >
              <span class="text-[14px] font-bold group-hover:text-blue-600"
                >Rain</span
              >
            </button>

            <button
              data-sound="calm"
              class="js-sound-btn sound-btn-active flex flex-col items-center justify-center p-4 rounded-[10px] transition-all cursor-pointer group"
            >
              <span
                class="text-2xl mb-2 group-hover:scale-110 transition-transform duration-300"
                >💤</span
              >
              <span class="text-[14px] font-bold">Calm</span>
            </button>

            <button
              data-sound="forest"
              class="js-sound-btn sound-btn-inactive flex flex-col items-center justify-center p-4 rounded-[10px] transition-all cursor-pointer group"
            >
              <span
                class="text-2xl mb-2 group-hover:scale-110 transition-transform duration-300"
                >🌲</span
              >
              <span class="text-[14px] font-bold group-hover:text-blue-600"
                >Forest</span
              >
            </button>
          </div>
        </section>

        <!-- 3. Statistics -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 md:gap-8">
          <section
            class="py-6 px-8 bg-white rounded-[20px] shadow-[0_0_15px_rgba(0,0,0,0.04)] border border-gray-100 flex flex-col justify-center"
          >
            <h3 class="text-gray-500 text-[14px] font-bold mb-1">
              Completed Tasks
            </h3>
            <div class="flex items-baseline gap-2">
              <span
                id="stat--completed-tasks"
                class="text-4xl font-bold font-condensed text-gray-900"
              >
                ?
              </span>
              <span class="text-xl font-bold font-condensed text-gray-400">
                / <span id="stat--total-tasks">?</span>
              </span>
            </div>
          </section>
          <section
            class="py-6 px-8 bg-white rounded-[20px] shadow-[0_0_15px_rgba(0,0,0,0.04)] border border-gray-100 flex flex-col justify-center"
          >
            <h3 class="text-gray-500 text-[14px] font-bold mb-1">
              Time in Focus
            </h3>
            <div
              id="stat--time-in-focus"
              class="text-4xl font-bold font-condensed text-gray-900"
            >
              0
            </div>
          </section>
        </div>
      </div>
      <!-- //////////////////////////////////////////////////////////////////////////////////////////// -->
      <!-- Right Column (Tasks) -->
      <div class="lg:col-span-5 flex flex-col">
        <section
          class="py-8 px-5 md:px-8 bg-white rounded-[20px] shadow-[0_0_15px_rgba(0,0,0,0.04)] border border-gray-100 flex-1 flex flex-col h-full"
        >
          <h1 class="text-xl mt-0 mb-6 font-bold font-condensed text-gray-800">
            Today's Plan
          </h1>

          <!-- Add Task Form -->
          <form class="flex flex-col sm:flex-row gap-3 mb-8 w-full">
            <input
              id="todo--task-text"
              type="text"
              placeholder="What are you working on?"
              class="flex-1 border border-gray-300 rounded-[10px] px-4 py-3 text-[16px] text-gray-800 placeholder-gray-400 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all bg-gray-50 focus:bg-white m-0"
            />
            <input
              id="todo--btn-add"
              type="submit"
              value="Add"
              class="text-white bg-blue-600 border-none font-bold hover:bg-blue-800 cursor-pointer px-6 py-3 rounded-[10px] text-[16px] transition-colors m-0 sm:w-auto w-full"
            />
          </form>

          <!-- To-Do List -->
          <ul
            id="todo--list"
            class="flex flex-col gap-3 p-0 m-0 list-none overflow-x-hidden"
          ></ul>
        </section>
      </div>
    </main>
    <!-- //////////////////////////////////////////// modal -->
    <div
      id="modal"
      class="hidden fixed inset-0 z-50 flex items-center justify-center p-4"
    >
      <div
        id="modal-backdrop"
        class="absolute inset-0 bg-gray-900/40 backdrop-blur-sm transition-opacity"
      ></div>

      <div
        class="relative bg-white rounded-[20px] shadow-2xl w-full max-w-sm p-6 transform transition-all"
      >
        <h2
          class="text-xl font-bold font-condensed text-gray-800 uppercase tracking-wider mb-4 border-b border-gray-100 pb-3"
        >
          Timer Settings
        </h2>
        <div class="flex flex-col gap-5 mb-8">
          <div class="flex items-center justify-between">
            <label class="text-[16px] font-bold text-gray-600"
              >Focus (min)</label
            >
            <input
              id="modal--input-focus-time"
              type="number"
              min="1"
              max="90"
              value="25"
              class="w-20 px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-center text-gray-800 font-bold focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
            />
          </div>

          <div class="flex items-center justify-between">
            <label class="text-[16px] font-bold text-gray-600"
              >Short Break (min)</label
            >
            <input
              id="modal--input-break-time"
              type="number"
              min="1"
              max="30"
              value="5"
              class="w-20 px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-center text-gray-800 font-bold focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
            />
          </div>
        </div>

        <div class="flex justify-end gap-3">
          <button
            id="modal--btn-cancel"
            class="px-5 py-2.5 rounded-[10px] text-gray-600 bg-gray-100 hover:bg-gray-200 font-bold transition-colors"
          >
            Cancel
          </button>
          <button
            id="modal--btn-save"
            class="px-5 py-2.5 rounded-[10px] text-white bg-blue-600 hover:bg-blue-800 font-bold transition-colors shadow-sm"
          >
            Save
          </button>
        </div>
      </div>
    </div>
    <div
      id="global-error-toast"
      class="fixed bottom-5 right-5 z-50 transform translate-y-24 opacity-0 transition-all duration-300 bg-red-100 border-l-4 border-red-500 text-red-700 p-4 rounded-[10px] shadow-lg flex items-center gap-3 pointer-events-none"
    >
      <span class="text-xl">🚨</span>
      <p id="global-error-text" class="font-bold text-[14px] m-0">
        Something went wrong!
      </p>
    </div>
  </body>
</html>
